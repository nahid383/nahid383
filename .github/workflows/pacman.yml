name: Generate Pacman

on:
  schedule:
    - cron: "0 */24 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: nahid383
      - uses: EndBug/add-and-commit@v9
        with:
          message: "generate pacman graph"
